<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Candidatura Realizada - TalentPulse</title>
    <!-- Tailwind CSS para estilização rápida -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Biblioteca de Confetes -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-xl shadow-md text-center max-w-md w-full">
        <div class="text-green-500 text-6xl mb-4">🎉</div>
        <h1 class="text-2xl font-bold text-gray-800 mb-2">Currículo Enviado!</h1>
        <p class="text-gray-600 mb-6">Sua candidatura para a vaga foi realizada com sucesso. Boa sorte!</p>
        <a href="#" class="inline-block bg-blue-600 text-white px-6 py-2 rounded-lg font-medium hover:bg-blue-700 transition">Fechar</a>
    </div>

    <script>
        // Dispara a animação de confetes assim que a página carrega
        window.onload = function() {
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 }
            });
        };
    </script>
</body>
</html>
