<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidatura Realizada - TalentPulse</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        body { background: #f8fafc; color: #334155; display: flex; justify-content: center; align-items: center; min-height: 100vh; text-align: center; padding: 20px; }
        .card { background: #ffffff; max-width: 500px; width: 100%; padding: 40px; border-radius: 20px; border: 1px solid #e2e8f0; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        .icon { font-size: 48px; margin-bottom: 16px; }
        h1 { font-size: 24px; color: #0f172a; margin-bottom: 12px; font-weight: 700; }
        p { font-size: 14px; color: #64748b; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🎉</div>
        <h1>Candidatura Realizada com Sucesso!</h1>
        <p>Recebemos as suas informações para a vaga <strong>{{ vaga.titulo }}</strong>. Nossos recrutadores analisarão seu perfil em breve através do nosso sistema inteligente.</p>
    </div>

    <script>
        window.addEventListener('load', () => {
            // Dispara animação de confetes
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 }
            });
        });
    </script>
</body>
</html>
